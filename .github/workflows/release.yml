name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: write  # to create and publish the GitHub Release
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: iwamot/actions/release-draft@287a9c9bfcc0bbf77670ad44804a5a66fdfb35bf # v1.0.0
      - uses: iwamot/actions/release-publish@287a9c9bfcc0bbf77670ad44804a5a66fdfb35bf # v1.0.0
