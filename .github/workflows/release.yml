name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: write  # to create and publish the GitHub Release
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: iwamot/actions/release-draft@fc024b0463f7096b399354cbfb2a97fcc77ec79d # v2.0.2
      - uses: iwamot/actions/release-publish@fc024b0463f7096b399354cbfb2a97fcc77ec79d # v2.0.2
